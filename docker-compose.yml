version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_combustible
    restart: always
    environment:
      POSTGRES_DB: plataforma_combustibles
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Elimina esta línea:
      # - ./src/main/resources/db/migration/V1__init_database.sql:/docker-entrypoint-initdb.d/01-init.sql
  
  backend:
    build: .
    container_name: backend_combustible
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/plataforma_combustibles
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

volumes:
  postgres_data: